[env:esp32dev-com3]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
	-DSIMULATION_MODE=1
lib_deps =
	bblanchon/ArduinoJson @ ^6.0.0
	marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
upload_protocol = esptool
upload_port = COM3